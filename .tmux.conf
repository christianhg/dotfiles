# Mouse support
set -g mouse on

# Scroll 3 lines at a time (default is 5)
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 3 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 3 scroll-down

# Start windows at 1
set -g base-index 1

# New panes/windows use current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# More history
set -g history-limit 100000

# Colors (Atom Dark)
set -g default-terminal "screen-256color"
set -g status-style bg='#21252b',fg='#abb2bf'
set -g status-left '#[fg=#98c379,bold] #S '
set -g status-right '#[fg=#5c6370] %H:%M '
setw -g window-status-current-style fg='#e5c07b',bold
set -g pane-border-style fg='#3e4451'
set -g pane-active-border-style fg='#61afef'
